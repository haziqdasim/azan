<head>
    <meta charset="UTF-8">

    <link href="css/bootstrap.min.css" rel="stylesheet">

        rel="stylesheet">

    <style>
        @font-face {
            font-family: 'bebas';
            src: url('fonts/BebasNeue.woff') format('woff'),
            url('fonts/BebasNeue.woff2') format('woff2'), 
            url('fonts/Inter-Medium.woff2') format('woff2'),
            url('fonts/Inter-Bold.woff2') format('woff2'),
            url('fonts/Inter-Black.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'inter-medium';
            src: url('fonts/Inter-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
        }

        @font-face {
            font-family: 'inter-bold';
            src: url('fonts/Inter-Bold.woff2') format('woff2');
            font-weight: 800;
            font-style: normal;
        }

        @font-face {
            font-family: 'inter-black';
            src: url('fonts/Inter-Black.woff2') format('woff2');
            font-weight: 900;
            font-style: normal;
        }

        body {
            background-color: white;
            color: black;
            font-family: 'Inter', 'bebas', sans-serif;
            overflow-x: hidden;
            background-image: linear-gradient(rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8)), url('assets/bg.webp');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
        }

        .card {
            border-radius: 20px;
            height: 200px;
        }

        .bg-primary-solid {
            background-color: #0268a2 !important;
            color: white !important;
            transition: all 0.4s ease;
            transform: scale(1.02);
            z-index: 2;
        }

        .bg-primary-solid .opacity-50,
        .bg-primary-solid .btn-outline-secondary,
        .bg-primary-solid hr {
            color: white !important;
            border-color: white !important;
            opacity: 1 !important;
        }

        .bg-primary-solid .badge {
            background-color: white !important;
            color: #0268a2 !important;
        }

        .glass-card {
            /* The "Glass" effect */
            background: rgba(255, 255, 255, 0.15); /* Translucent white */
            backdrop-filter: blur(12px) saturate(180%); /* The blur + color boost */
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            
             
            
            /* "Liquid" Sheen */
            background: linear-gradient(
                135deg, 
                rgba(255, 255, 255, 0.2) 0%, 
                rgba(255, 255, 255, 0.05) 100%
            );
        }

        .bebas{
            font-family: 'bebas';
            src: url('fonts/BebasNeue.woff') format('woff'), url('fonts/BebasNeue.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        .inter-black{
            font-family: 'inter-black';
            src: url('fonts/Inter-Black.woff2') format('woff2');
            font-weight: 900;
            font-style: normal;
        }

        .inter-bold{
            font-family: 'inter-bold';
            src: url('fonts/Inter-Bold.woff2') format('woff2');
            font-weight: 800;
            font-style: normal;
        }

        .inter-medium{
            font-family: 'inter-medium';
            src: url('fonts/Inter-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
        }

        .card-body{
            align-content: center;
        }

        .clock-card{
            flex: auto;
        }

        /* Blinking Animation */
        @keyframes blink-active {
            0% { opacity: 1; transform: scale(1.02); }
            50% { opacity: 0.7; transform: scale(1.0); }
            100% { opacity: 1; transform: scale(1.02); }
        }

        .blink-mode {
            animation: blink-active 1s infinite ease-in-out;
            background-color: #0268a2 !important;
            color: white !important;
            border-radius: 16px;
        }

        /* Fixed Highlight (After blinking or during normal active) */
        .highlight-solid {
            background-color: #0268a2 !important;
            color: white !important;
            transform: scale(1.02);
            transition: all 0.4s ease;
            z-index: 2;
        }

        /* Ensure text is visible in highlight */
        .highlight-solid .opacity-50, .blink-mode .opacity-50 {
            color: white !important;
            opacity: 1 !important;
        }

    </style>
</head>

    <div class="modal fade" id="settingsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Ubah Zon</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">Pilih Zon</label>
                    <select class="form-select" id="zoneSelect">
                        <option value="SGR01" selected>Selangor (Gombak, Petaling, Sepang, Hulu Langat, Hulu Selangor,
                            Shah Alam)</option>
                        <option value="SGR02">Selangor (Kuala Selangor, Sabak Bernam)</option>
                        <option value="SGR03">Selangor (Klang, Kuala Langat)</option>

                        <option value="JHR01">Johor (Pulau Aur dan Pulau Pemanggil)</option>
                        <option value="JHR02">Johor (Johor Bahru, Kota Tinggi, Mersing)</option>
                        <option value="JHR03">Johor (Kluang, Pontian)</option>
                        <option value="JHR04">Johor (Batu Pahat, Muar, Segamat, Gemas Johor)</option>

                        <option value="MLK01">Seluruh Negeri Melaka</option>

                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary rounded-pill px-4" onclick="saveSettings()">Tukar Sekarang</button>
                </div>
            </div>
        </div>

    <script>
        const hijriMonths = ["Muharam", "Safar", "Rabiul Awal", "Rabiul Akhir", "Jamadil Awal", "Jamadil Akhir", "Rejab", "Sya'ban", "Ramadan", "Syawal", "Zulkaedah", "Zulhijjah"];
        const zoneNames = { "SGR01": "Daerah Hulu Selangor, Gombak, Petaling, Sepang Dan Hulu Langat", "SGR02": "Daerah Sabak Bernam Dan Kuala Selangor", "SGR03": "Daerah Klang Dan Kuala Langat", "JHR01": "Johor. Pulau Aur dan Pulau Pemanggil", "JHR02": "Johor. Johor Bahru, Kota Tinggi, Mersing", "MLK01": "Melaka. Melaka Tengah, Alor Gajah, Jasin", "WLY01": "Kuala Lumpur, Putrajaya" };

        let currentZone = localStorage.getItem('azanZone') || 'SGR01';
        let prayerDataTimes = {};

        // ... existing constants (hijriMonths, zoneNames, etc.) ...

        function updateClock() {
            const now = new Date();
            
            // Display HH:MM
            document.getElementById('liveClock').innerText = now.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit',
                hour12: true
            });

            // Display SS seconds
            document.getElementById('liveClock-second').innerText = now.getSeconds().toString().padStart(2, '0') + " seconds";

            document.getElementById('masihiDate').innerText = now.toLocaleDateString('ms-MY', {
                year: 'numeric', 
                month: 'short', 
                day: 'numeric'
            });

            updateUIStates(now);
        }

        function updateUIStates(now) {
            let currentActiveId = null;
            let nextPrayerId = null;
            const sortedKeys = ['fajr', 'syuruk', 'dhuhr', 'asr', 'maghrib', 'isha'];

            // 1. Determine current active prayer
            for (let i = 0; i < sortedKeys.length; i++) {
                const id = sortedKeys[i];
                const prayerDate = prayerDataTimes[id];
                if (prayerDate && now >= prayerDate) {
                    currentActiveId = id;
                }
            }

            // 2. Determine next prayer for the timer
            // If we are past Isha, the next prayer is Fajr (technically tomorrow, but we'll show the gap)
            nextPrayerId = sortedKeys.find(id => prayerDataTimes[id] > now);

            // 3. Special Rule for Syuruk highlight
            if (currentActiveId === 'syuruk') {
                const syurukTime = prayerDataTimes['syuruk'];
                const diffInMinutes = (now - syurukTime) / 1000 / 60;
                if (diffInMinutes >= 15) {
                    currentActiveId = 'dhuhr';
                }
            }

            // 4. Update UI for each card
            sortedKeys.forEach(id => {
                const cardElement = document.getElementById(`time-${id}`).closest('.card');
                const timerElement = document.getElementById(`timer-${id}`);
                
                // Reset states
                cardElement.classList.remove('highlight-solid', 'blink-mode');
                timerElement.style.display = 'none'; // Hide all timers by default

                // Highlight Active
                if (id === currentActiveId) {
                    const startTime = prayerDataTimes[id];
                    const diffInSeconds = (now - startTime) / 1000;

                    if (diffInSeconds >= 0 && diffInSeconds <= 60 && id !== 'dhuhr' || (id === 'dhuhr' && now >= prayerDataTimes['dhuhr'] && diffInSeconds <= 60)) {
                        cardElement.classList.add('blink-mode');
                    } else {
                        cardElement.classList.add('highlight-solid');
                    }
                }

                // Show timer ONLY for the NEXT prayer
                if (id === nextPrayerId) {
                    timerElement.style.display = 'block';
                    const diffMs = prayerDataTimes[id] - now;
                    const h = Math.floor(diffMs / 3600000);
                    const m = Math.floor((diffMs % 3600000) / 60000);
                    const s = Math.floor((diffMs % 60000) / 1000);
                    
                    timerElement.innerText = `-${h}h ${m}m ${s}s`;
                    timerElement.classList.add('text-primary'); 
                }
            });
        }

        async function fetchPrayerTimes() {
            try {
                const response = await fetch(`https://www.e-solat.gov.my/index.php?r=esolatApi/takwimsolat&zone=${currentZone}&period=today`);
                const result = await response.json();

                if (result.status === "OK!" && result.prayerTime.length > 0) {
                    const todayData = result.prayerTime[0];

                    // Hijrah Date Formatting
                    const hijriParts = todayData.hijri.split('-');
                    const hijriFullDate = `${hijriParts[2]} ${hijriMonths[parseInt(hijriParts[1]) - 1]} ${hijriParts[0]}`;
                    document.getElementById('hijriDate').innerText = hijriFullDate;
                    document.getElementById('currentZone').innerText = `Zon: ${zoneNames[currentZone] || currentZone}`;

                    const prayerMapping = {
                        'fajr': todayData.fajr,
                        'syuruk': todayData.syuruk,
                        'dhuhr': todayData.dhuhr,
                        'asr': todayData.asr,
                        'maghrib': todayData.maghrib,
                        'isha': todayData.isha
                    };

                    for (const [id, timeStr] of Object.entries(prayerMapping)) {
                        const [h, m] = timeStr.split(':');
                        const t = new Date();
                        t.setHours(parseInt(h), parseInt(m), 0);
                        prayerDataTimes[id] = t;

                        document.getElementById(`time-${id}`).innerText = t.toLocaleTimeString('en-GB', {
                            hour: '2-digit', minute: '2-digit', hour12: true
                        }).toUpperCase();
                    }
                    // Initial UI update
                    updateUIStates(new Date());
                }
            } catch (error) {
                console.error("Fetch error:", error);
            }
        }

        function saveSettings() {
            currentZone = document.getElementById('zoneSelect').value;
            localStorage.setItem('azanZone', currentZone);
            fetchPrayerTimes();
            bootstrap.Modal.getInstance(document.getElementById('settingsModal')).hide();
        }

        setInterval(updateClock, 1000);
        updateClock();
        fetchPrayerTimes();

        function updateClock() {
            const now = new Date();

            document.getElementById('liveClock').innerText = now.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit',
                hour12: true
            });

            document.getElementById('liveClock-second').innerText = now.toLocaleTimeString('en-US', {
                second: '2-digit',
            });

            document.getElementById('masihiDate').innerText = now.toLocaleDateString('ms-MY', {
                // weekday: 'long',
                year: 'numeric', 
                month: 'long', 
                day: 'numeric'
            });

            updateUIStates(now);
        }

        const refreshBtn = document.getElementById("refreshButton");
        refreshBtn.addEventListener("click", function() {
            window.location.reload();
        });



    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
