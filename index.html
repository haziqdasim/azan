<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AZAN - Waktu Solat</title>
    <link href="css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Roboto:wght@300;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>

        @font-face {
            font-family: "bebas";
            src: url("fonts/BebasNeue.woff") format("woff"),
                url("fonts/BebasNeue.woff2") format("woff2");
            font-weight: 400;
            font-style: normal;
        }

        @font-face {
            font-family: "inter-medium";
            src: url("fonts/Inter-Medium.woff2") format("woff2");
            font-weight: 500;
            font-style: normal;
        }

        @font-face {
            font-family: "inter-bold";
            src: url("fonts/Inter-Bold.woff2") format("woff2");
            font-weight: 800;
            font-style: normal;
        }

        @font-face {
            font-family: "inter-black";
            src: url("fonts/Inter-Black.woff2") format("woff2");
            font-weight: 900;
            font-style: normal;
        }

        body {
            background-color: white;
            color: black;
            font-family: "Inter", "bebas", sans-serif;
            overflow-x: hidden;
            /* background-image: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)), url("assets/bg.webp"); */
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
        }

        .card {
            border-radius: 13px;
            height: 200px;
            
            background-color: #1e1e1e11 !important;
        
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .bg-primary-solid {
            background-color: #0268a2 !important;
            color: white !important;
            transition: all 0.4s ease;
            transform: scale(1.02);
            z-index: 2;
        }

        .bg-primary-solid .opacity-50,
        .bg-primary-solid .btn-outline-secondary,
        .bg-primary-solid hr {
            color: white !important;
            border-color: white !important;
            opacity: 1 !important;
        }

        .bg-primary-solid .badge {
            background-color: white !important;
            color: #0268a2 !important;
        }
        

        .bebas {
            font-family: "bebas";
            src: url("fonts/BebasNeue.woff2") format("woff2");
            font-weight: normal;
            font-style: normal;
        }

        .bebas-bold {
            font-family: "bebas-bold";
            src: url("fonts/BebasNeue-Bold.woff2") format("woff2");
            font-weight: 800;
            font-style: normal;
        }

        .inter-black {
            font-family: "inter-black";
            src: url("fonts/Inter-Black.woff2") format("woff2");
            font-weight: 900;
            font-style: normal;
        }

        .inter-bold {
            font-family: "inter-bold";
            src: url("fonts/Inter-Bold.woff2") format("woff2");
            font-weight: 800;
            font-style: normal;
        }

        .inter-medium {
            font-family: "inter-medium";
            src: url("fonts/Inter-Medium.woff2") format("woff2");
            font-weight: 500;
            font-style: normal;
        }

        .card-body-custom {
            align-content: center;
            flex: 1 1 auto;
            padding: var(--bs-card-spacer-y) var(--bs-card-spacer-x);
            color: var(--bs-card-color);
        }

        .clock-card {
            position: relative;
            overflow: hidden; /* Keeps the animation inside the rounded corners */
            z-index: 1;
            flex: auto;

            /* background: linear-gradient(-45deg, #0268A2, #0388D4, #0268A2, #0388D4); */
            /* background: linear-gradient(-45deg, #8ec4ff, #0494e4, #037dc2, #015585); */
            background: linear-gradient(-45deg, #8ec5ff70, #0496e470, #037cc270, #01558570);
            background-size: 400% 400%;
            animation: gradient 6s ease infinite;

            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .hijridate-color
        {
            color: #03a9f4;
        }


        /* gradient animation */
        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }


        /* Blinking Animation */
        @keyframes blink-active {
            0% {
                opacity: 1;
                transform: scale(1.02);
            }

            50% {
                opacity: 0.7;
                transform: scale(1);
            }

            100% {
                opacity: 1;
                transform: scale(1.02);
            }
        }

        .blink-mode {
            animation: blink-active 1s infinite ease-in-out;
            background-color: #0268a2 !important;
            color: white !important;
            border-radius: 16px;
        }

        /* Fixed Highlight (After blinking or during normal active) */
        .highlight-solid {
            background-color: #0268a2 !important;
            color: white !important;
            transform: scale(1.02);
            transition: all 0.4s ease;
            z-index: 2;
        }

        /* Ensure text is visible in highlight */
        .highlight-solid .opacity-50,
        .blink-mode .opacity-50 {
            color: white !important;
            opacity: 1 !important;
        }

        @keyframes blink-steps {
        to {
            visibility: hidden;
        }
        }

        .warning-icon {
        animation: blink-steps 1s steps(1) infinite;
        }

        /* Animation for the status circle */
        @keyframes status-blink {
            0% { opacity: 1; }
            50% { opacity: 0.1; }
            100% { opacity: 1; }
        }

        .blink-status {
            animation: status-blink 1.5s infinite ease-in-out;
            font-size: 12px;
        }

        /* Dark Mode Styles */
        body.dark-mode {
            background-color: #121212 !important;
            background-image: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), url("assets/bg.webp") !important;
            color: #e0e0e0 !important;
        }

        .bg-white {
            background-color: #ffffff00 !important;
            
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        body.dark-mode .bg-white {
            background-color: #1e1e1e80 !important;
            color: #ffffff !important;
            
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        body.dark-mode .card {
            background-color: #252525;
            border-color: #333;
            color: white;
        }

        body.dark-mode .text-navy, 
        body.dark-mode h1.inter-black {
            /* color: #03a9f4 !important; */
            color: #03a9f4 !important;
        }

        body.dark-mode .text-muted {
            color: #b0b0b0 !important;
        }

        body.dark-mode .modal-content {
            background-color: #1e1e1e;
            color: #ffffff;
        }

        body.dark-mode .btn-light {
            background-color: #333;
            color:#ffffff;
            border-color: #444;
        }

        /* Ensure active prayer cards stay visible */
        body.dark-mode .highlight-solid {
            background-color: #0267a270 !important;
        }


        
        /* 1. Ensure the video stays at the very bottom */
        #bg-video {
            position: fixed;
            top: 40%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2; 
            transform: translate(-50%, -50%); /* This centers the video */
            object-fit: cover;
        }

        /* 2. Create the Overlay Layer */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Default Light Mode Overlay: Soft White */
            background: rgba(255, 255, 255, 0.85);
            z-index: -1;
            transition: background 0.5s ease;
        }

        /* 3. Dark Mode Overlay adjustment */
        body.dark-mode::before {
            background: rgba(0, 0, 0, 0.2);
        }

    </style>
</head>

    <script>
        const hijriMonths = [
            "Muharam",
            "Safar",
            "Rabiul Awal",
            "Rabiul Akhir",
            "Jamadil Awal",
            "Jamadil Akhir",
            "Rejab",
            "Sya'ban",
            "Ramadan",
            "Syawal",
            "Zulkaedah",
            "Zulhijjah",
        ];
        const zoneNames = {
            SGR01: "Daerah Hulu Selangor, Gombak, Petaling, Sepang Dan Hulu Langat",
            SGR02: "Daerah Sabak Bernam Dan Kuala Selangor",
            SGR03: "Daerah Klang Dan Kuala Langat",
            JHR01: "Johor. Pulau Aur dan Pulau Pemanggil",
            JHR02: "Johor. Johor Bahru, Kota Tinggi, Mersing",
            MLK01: "Melaka. Melaka Tengah, Alor Gajah, Jasin",
            WLY01: "Kuala Lumpur, Putrajaya",
            KTN01: "Bachok, Kota Bharu, Machang, Pasir Mas, Pasir Puteh, Tanah Merah, Tumpat, Kuala Krai, Mukim Chiku",
            KTN02: "Gua Musang (Daerah Galas Dan Bertam), Jeli, Jajahan Kecil Lojing",
        };

        let currentZone = localStorage.getItem("azanZone") || "SGR01";
        let prayerDataTimes = {};

        // ... existing constants (hijriMonths, zoneNames, etc.) ...

        function updateClock() {
            const now = new Date();

            // Display countdown HH:MM
            document.getElementById("liveClock").innerText = now.toLocaleTimeString(
                "en-US",
                {
                    hour: "2-digit",
                    minute: "2-digit",
                    hour12: true,
                }
            );

            // Display SS seconds
            document.getElementById("liveClock-second").innerText = now.getSeconds().toString().padStart(2, "0") + " seconds";

            document.getElementById("masihiDate").innerText =
                now.toLocaleDateString("ms-MY", {
                    year: "numeric",
                    month: "short",
                    day: "numeric",
                });

            updateUIStates(now);
        }

        function updateUIStates(now) {
            let currentActiveId = null;
            let nextPrayerId = null;
            const sortedKeys = ["fajr", "syuruk", "dhuhr", "asr", "maghrib", "isha"];

            // 1. Determine current active prayer
            for (let i = 0; i < sortedKeys.length; i++) {
                const id = sortedKeys[i];
                const prayerDate = prayerDataTimes[id];
                if (prayerDate && now >= prayerDate) {
                    currentActiveId = id;
                }
            }

            // 2. Determine next prayer for the timer
            nextPrayerId = sortedKeys.find((id) => prayerDataTimes[id] > now);

            // --- NEW: PRAYER REMINDER LOGIC ---
            const reminderCard = document.getElementById("prayerReminder").closest(".card");

            // Check if next prayer exists and is NOT syuruk
            if (nextPrayerId && nextPrayerId !== "syuruk") {
                const nextTime = prayerDataTimes[nextPrayerId];
                const diffMs = nextTime - now;
                const diffMinutes = diffMs / 1000 / 60;

                // Show card only if within 10 minutes
                if (diffMinutes > 0 && diffMinutes <= 10) {
                    reminderCard.style.display = "block";

                    // Calculate MM:SS
                    const m = Math.floor((diffMs % 3600000) / 60000);
                    const s = Math.floor((diffMs % 60000) / 1000);

                    document.getElementById("timerPrayer").innerText = `${m}m ${s}s`;

                    // Map ID to Display Name
                    const names = { fajr: "Subuh", dhuhr: "Zohor", asr: "Asar", maghrib: "Maghrib", isha: "Isyak" };
                    document.getElementById("nextPrayer").innerText = names[nextPrayerId];
                } else {
                    reminderCard.style.display = "none";
                }
            } else {
                reminderCard.style.display = "none";
            }
            // --- END NEW LOGIC ---

            // 3. Special Rule for Syuruk highlight
            if (currentActiveId === "syuruk") {
                const syurukTime = prayerDataTimes["syuruk"];
                const diffInMinutes = (now - syurukTime) / 1000 / 60;
                if (diffInMinutes >= 15) {
                    currentActiveId = "dhuhr";
                }
            }

            // 4. Update UI for each card
            sortedKeys.forEach((id) => {
                const cardElement = document.getElementById(`time-${id}`).closest(".card");
                const timerElement = document.getElementById(`timer-${id}`);

                cardElement.classList.remove("highlight-solid", "blink-mode");
                timerElement.style.display = "none";

                if (id === currentActiveId) {
                    const startTime = prayerDataTimes[id];
                    const diffInSeconds = (now - startTime) / 1000;

                    if ((diffInSeconds >= 0 && diffInSeconds <= 60 && id !== "dhuhr") ||
                        (id === "dhuhr" && now >= prayerDataTimes["dhuhr"] && diffInSeconds <= 60)) {
                        cardElement.classList.add("blink-mode");
                    } else {
                        cardElement.classList.add("highlight-solid");
                    }
                }

                if (id === nextPrayerId) {
                    timerElement.style.display = "block";
                    const diffMs = prayerDataTimes[id] - now;
                    const h = Math.floor(diffMs / 3600000);
                    const m = Math.floor((diffMs % 3600000) / 60000);
                    timerElement.innerText = h == 0 ? `${m} Min` : `${h} Jam ${m} Min`;
                }
            });
        }

        async function fetchPrayerTimes() {
            try {
                const response = await fetch(
                    `https://www.e-solat.gov.my/index.php?r=esolatApi/takwimsolat&zone=${currentZone}&period=today`
                );
                const result = await response.json();

                if (result.status === "OK!" && result.prayerTime.length > 0) {
                    const todayData = result.prayerTime[0];

                    // Hijrah Date Formatting
                    const hijriParts = todayData.hijri.split("-");
                    const hijriFullDate = `${hijriParts[2]} ${hijriMonths[parseInt(hijriParts[1]) - 1]
                        } ${hijriParts[0]}`;
                    document.getElementById("hijriDate").innerText = hijriFullDate;
                    document.getElementById("currentZone").innerText = `Zon: ${zoneNames[currentZone] || currentZone
                        }`;

                    const prayerMapping = {
                        fajr: todayData.fajr,
                        syuruk: todayData.syuruk,
                        dhuhr: todayData.dhuhr,
                        asr: todayData.asr,
                        maghrib: todayData.maghrib,
                        isha: todayData.isha,
                    };

                    for (const [id, timeStr] of Object.entries(prayerMapping)) {
                        const [h, m] = timeStr.split(":");
                        const t = new Date();
                        t.setHours(parseInt(h), parseInt(m), 0);
                        prayerDataTimes[id] = t;

                        document.getElementById(`time-${id}`).innerText = t.toLocaleTimeString("en-US", {
                            hour: "2-digit",
                            minute: "2-digit",
                            hour12: true
                        }).replace(/\s?[AP]M/i, ""); // This regex removes the AM/PM part
                    }
                    // Initial UI update
                    updateUIStates(new Date());
                }
            } catch (error) {
                console.error("Fetch error:", error);
            }
        }

        function saveSettings() {
            currentZone = document.getElementById("zoneSelect").value;
            localStorage.setItem("azanZone", currentZone);
            fetchPrayerTimes();
            bootstrap.Modal.getInstance(
                document.getElementById("settingsModal")
            ).hide();
        }

        setInterval(updateClock, 1000);
        updateClock();
        fetchPrayerTimes();

        function updateClock() {
            const now = new Date();
            const seconds = now.getSeconds();
            const milliseconds = now.getMilliseconds();
            

            // 1. Text Clock Update (HH:MM)
            const timeString = now.toLocaleTimeString("en-US", {
                hour: "2-digit",
                minute: "2-digit",
                second:"2-digit",
                hour12: true,
            });
            
            if (document.getElementById("liveClock").innerText !== timeString) {
                document.getElementById("liveClock").innerText = timeString;
            }

            // 2. Date Updates
            document.getElementById("masihiDate").innerText = now.toLocaleDateString("ms-MY", {
                weekday: "long",
                year: "numeric",
                month: "short",
                day: "numeric",
            });

            // Keep the UI states (highlights/timers) updated
            updateUIStates(now);
            
        }
        

        // Fetch prayer times separately so they don't run 60 times a second
        setInterval(fetchPrayerTimes, 600000); // Refresh data every 10 mins

        const refreshBtn = document.getElementById("refreshButton");
        refreshBtn.addEventListener("click", function () {
            window.location.reload();
        });


        // --- NEW: Countdown Logic ---
        function updateRamadanCountdowns() {
            const now = new Date();
            
            // Target Dates for 2026
            const countdown01Date = new Date("2026-05-27T00:00:00"); // Hari Raya Aidiladha
            const countdown02Date = new Date("2026-06-16T00:00:00"); // Maal Hijrah
            const countdown03Date = new Date("2026-09-12T00:00:00"); // Maulidur Rasul

            function getRemainingDays(targetDate, elementId, cardId) {
                const diffTime = targetDate - now;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                const element = document.getElementById(elementId);
                const card = document.getElementById(cardId);

                if (!element || !card) return; // Safety check

                if (diffDays > 0) {
                    element.innerText = `${diffDays} Hari Lagi`;
                } else if (diffDays === 0) {
                    element.innerText = `Hari Ini`;
                    card.classList.add("bg-primary-solid"); 
                } else {
                    element.innerText = `Telah Berlalu`;
                    card.style.opacity = "0.5";
                    card.classList.remove("bg-primary-solid");
                }
            }

            getRemainingDays(countdown01Date, "timerCountdown01", "cardCountdown01");
            getRemainingDays(countdown02Date, "timerCountdown02", "cardCountdown02");
            getRemainingDays(countdown03Date, "timerCountdown03", "cardCountdown03");
        }

        // Add this call inside your existing initialization
        updateRamadanCountdowns();
        // Optional: Update once a day or every hour
        setInterval(updateRamadanCountdowns, 3600000);


        // Function to refresh the page at 12:01 AM
        function checkMidnightRefresh() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();

            // Check if it is exactly 12:01 AM
            if (hours === 0 && minutes === 1) {
                console.log("Refreshing for new day data...");
                window.location.reload();
            }
        }

        // Check the time every 60 seconds (60000 milliseconds)
        setInterval(checkMidnightRefresh, 60000);


    </script>

    <script>
        const modeBtn = document.getElementById("modeBtn");
        const body = document.body;

        // 1. Check for saved preference on load
        if (localStorage.getItem("theme") === "dark") {
            enableDarkMode();
        }

        // 2. Toggle button event listener
        modeBtn.addEventListener("click", () => {
            if (body.classList.contains("dark-mode")) {
                disableDarkMode();
            } else {
                enableDarkMode();
            }
        });

        function enableDarkMode() {
            body.classList.add("dark-mode");
            modeBtn.innerHTML = '<i class="fa-solid fa-sun me-1"></i> <span class="inter-medium">Mod Terang</span>';
            modeBtn.classList.replace("btn-dark", "btn-dark"); // Changes button color to yellow
            localStorage.setItem("theme", "dark");
        }

        function disableDarkMode() {
            body.classList.remove("dark-mode");
            modeBtn.innerHTML = '<i class="fa-solid fa-moon me-1"></i> <span class="inter-medium">Mod Gelap</span>';
            modeBtn.classList.replace("btn-dark", "btn-dark");
            localStorage.setItem("theme", "light");
        }
    </script>
